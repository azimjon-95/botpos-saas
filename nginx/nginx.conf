# BOT·POS — NGINX lokal config (Windows)
# Joylashuv: C:\nginx\conf\nginx.conf

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Loglar
    access_log  logs/access.log;
    error_log   logs/error.log;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    # ── ADMIN PANEL — localhost:8080 ──────────────────────────────────────────
    server {
        listen 8080;
        server_name localhost;

        # Admin React :3000 ga proxy
        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_read_timeout 60s;
        }

        # Admin API :6060 ga proxy
        location /api/ {
            proxy_pass         http://127.0.0.1:6060;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Socket.IO
        location /socket.io/ {
            proxy_pass         http://127.0.0.1:6060;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;
        }
    }

    # ── WEBAPP (MIJOZ SAYT) — localhost:8081 ──────────────────────────────────
    server {
        listen 8081;
        server_name localhost;

        # WebApp React :3001 ga proxy
        location / {
            proxy_pass         http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_read_timeout 60s;
        }

        # WebApp API :6060 ga proxy
        location /api/ {
            proxy_pass         http://127.0.0.1:6060;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    # ── BACKEND DIRECTLY — localhost:6060 ─────────────────────────────────────
    # Node.js to'g'ridan ishlatiladi, NGINX proxy shart emas
    # Faqat yuqoridagi /api/ orqali murojaat qiling
}
